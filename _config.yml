# Site Settings
title: whiteblog-theme
description: "A minimal Jekyll theme for technical blogs with dark mode, categories, and search."


# Site Author
author:
  name             : "Victor Silva"
  avatar           : "/assets/images/avatar.jpg"
  about-photo      : "/assets/images/bio-photo.jpg"
  bio              : 
  location         : "Montevideo, Uruguay"
  uri              :
  x                : "vmsilvamolina"
  linkedin         : "vmsilvamolina" # "john-doe-12345678" (the last part of your profile url, e.g. https://www.linkedin.com/in/john-doe-12345678)
  email            : "info@victorsilva.com.uy"
  github           : "vmsilvamolina"
  stackoverflow    : # "123456/username" (the last part of your profile url, e.g. https://stackoverflow.com/users/123456/username)

plugins:
  - jekyll-redirect-from
  - jekyll-gist
  - jekyll-paginate
  - jekyll-feed
  - jekyll-sitemap

addons:
  back_to_top            : true                  # true (default), false
  share_post             : true                  # true (default), false
  old_post_warning       : false                 # true, false (default)

header_pages:
  # - _pages/contact.md
  # - _pages/setup.md
  # - _pages/github.md
  - _pages/about.md
  - _pages/search.md
  - _pages/categories.md

include:
  - _pages

exclude:
  - Gemfile
  - Gemfile.lock
  - whiteblogtheme.gemspec

comments:
  provider               : false                 # false (default), "disqus", "cusdis", "giscus"
  disqus:
    shortname            : ""                    # your disqus shortname
  cusdis:
    appId                : ""                    # your cusdis app id
  giscus:
    repo                 : ""                    # "username/repo-name"
    repo_id              : ""                    # from giscus.app
    category             : ""                    # discussion category name
    category_id          : ""                    # from giscus.app
    mapping              : "pathname"            # pathname (default), url, title, og:title
    reactions_enabled    : "1"                   # "1" (default), "0"
    input_position       : "top"                 # "top" (default), "bottom"
    theme                : "preferred_color_scheme" # light, dark, preferred_color_scheme
    lang                 : "en"                  # comment language

analytics:
  google:
    tracking_id          :                       # false (default), "G-XXXXXXXXXX"

# Outputting
permalink: /:title/ #/:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
